<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Radio - Colectivos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e222b; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #btn-radio { width: 200px; height: 200px; border-radius: 50%; background-color: #2ed573; border: 6px solid #2f3542; color: white; font-size: 20px; font-weight: bold; cursor: pointer; outline: none; transition: background 0.2s, transform 0.1s; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        #btn-radio:active { background-color: #26af5f; transform: scale(0.96); }
        #status { margin-top: 30px; font-size: 18px; color: #a4b0be; font-weight: bold; }
    </style>
</head>
<body>

    <button id="btn-radio">PRESIONA<br>PARA HABLAR</button>
    <div id="status">Conectando a la red...</div>

    <script>
        const statusDiv = document.getElementById('status');
        const btnRadio = document.getElementById('btn-radio');
        
        // Dirección oficial de tu backend en Render
        const ws = new WebSocket('wss://servidor-colectivos.onrender.com');
        
        let mediaRecorder;
        let chunks = [];

        ws.onopen = () => {
            statusDiv.innerText = '📻 Conectado a la Central - Listo';
        };

        ws.onclose = () => {
            statusDiv.innerText = '⚠️ Desconectado. Reintentando...';
        };

        ws.onerror = (err) => {
            console.error('Error WebSocket:', err);
        };

        // ESCUCHAR AL CELULAR (Esto ya te funciona)
        ws.onmessage = async (event) => {
            statusDiv.innerText = '🔊 Escuchando al chofer...';
            try {
                const audioBlob = event.data;
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                await audio.play();
                audio.onended = () => {
                    statusDiv.innerText = '📻 Conectado a la Central - Listo';
                };
            } catch (e) {
                console.error('Error al reproducir audio en web:', e);
                statusDiv.innerText = '📻 Conectado a la Central - Listo';
            }
        };

        // TRANSMITIR HACIA EL CELULAR (Ajustado para compatibilidad móvil)
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                // Forzamos un formato estándar que el decodificador del teléfono entienda sin problemas
                let options = { mimeType: 'audio/webm;codecs=opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'audio/ogg;codecs=opus' };
                }
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = {}; // Si el navegador es antiguo usa la configuración por defecto
                }

                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    chunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    // Empaquetamos todo el fragmento grabado en un Blob limpio
                    const audioBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    chunks = [];
                    
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(audioBlob);
                        statusDiv.innerText = '✅ Mensaje enviado a la ruta';
                        setTimeout(() => {
                            statusDiv.innerText = '📻 Conectado a la Central - Listo';
                        }, 1500);
                    }
                };

                // Eventos del botón para simular Walkie-Talkie físico
                btnRadio.addEventListener('mousedown', () => {
                    if (ws.readyState !== WebSocket.OPEN) return;
                    chunks = [];
                    mediaRecorder.start();
                    statusDiv.innerText = '🎙️ Transmitiendo a los colectivos...';
                    btnRadio.style.backgroundColor = '#ff4757';
                });

                btnRadio.addEventListener('mouseup', () => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        btnRadio.style.backgroundColor = '#2ed573';
                    }
                });

                // Soporte para pantallas táctiles por si abres la web desde otro teléfono
                btnRadio.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (ws.readyState !== WebSocket.OPEN) return;
                    chunks = [];
                    mediaRecorder.start();
                    statusDiv.innerText = '🎙️ Transmitiendo a los colectivos...';
                    btnRadio.style.backgroundColor = '#ff4757';
                });

                btnRadio.addEventListener('touchend', () => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        btnRadio.style.backgroundColor = '#2ed573';
                    }
                });
            })
            .catch(err => {
                console.error('No se pudo acceder al micrófono de la PC:', err);
                statusDiv.innerText = '❌ Error: Permite el uso del micrófono en tu navegador';
            });
    </script>
</body>
</html>
